<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>로그인 테스트</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .hero { min-height: 100vh; }
  </style>
</head>
<body>
<!기존index.html 디자인을재활용한다.-->
<section class="hero d-flex align-items-center
justify-content-center text-center py-5">
<div class="container" style="max-width: 400px;">
<h2 class="fw-bold mb-4">로그인</h2>
<form method="POST" action="/login_check" id="loginForm">
<div class="mb-3 text-start">
<label class="form-label">아이디</label>
<input type="text" class="form-control"
id="usernameInput" name="username" placeholder="4~20자영문/숫자"required>
<div class="invalid-feedback" id="usernameMsg"></div>
</div>
<div class="mb-3 text-start">
<label class="form-label">패스워드</label>
<input type="password" class="form-control"
id="passwordInput" placeholder="8자이상, 영문+숫자+특수문자"required>
<div class="invalid-feedback" id="passwordMsg"></div>
<input type="hidden" id="password" name="password">
</div>

        
<button type="button" onclick="validateAndLogin()"
class="btn btn-primary w-100">로그인</button>
<!-- 신규 추가-->
 <!--기존로그아웃버튼앞에추가-->
<li class="nav-item">
<a class="nav-link" href="/profile">
1F464 프로필
</a>
</li>
<li class="nav-item">
<a class="nav-link btn btn-outline-danger btn-sm px-3"
href="/logout">로그아웃</a>
</li>
<hr>
<a href="register.html"
class="btn btn-outline-secondary w-100">
회원가입
</a>
</form>
</div>
</section>
<script src="../js/input_check.js"></script>
<script src="../js/input_sha256.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
