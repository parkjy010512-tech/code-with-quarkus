<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>로그인 테스트</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .hero { min-height: 100vh; }
  </style>
</head>
<body>
  <section class="hero d-flex align-items-center justify-content-center text-center py-5">
    <div class="container" style="max-width: 400px;">
      <h2 class="fw-bold mb-4">로그인</h2>
      <form method="POST" action="/login_check">
        <div class="mb-3 text-start">
          <label class="form-label">아이디</label>
          <input type="text" class="form-control" name="username" placeholder="아이디입력" required>
        </div>
        <div class="mb-3 text-start">
          <label class="form-label">패스워드</label>
          <input type="password" class="form-control" name="password" placeholder="패스워드입력" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">로그인</button>
        
<hr>
<a href="register.html" 
class="btn btn-outline-secondary w-100"> 회원가입</a>
      </form>
    </div>
  </section>
</body>
</html>
